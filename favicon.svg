<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <!-- 
    Favicon Design for BLKOUT
    Subject: Stylised G36 Rifle 
    Style: High-Contrast, Cyberpunk / Modern Tactical
  -->

  <defs>
    <!-- Tactical Grid Pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#10121A" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background Base: Heavy App Icon Hexagon -->
  <polygon points="128,4 246,64 246,192 128,252 10,192 10,64" fill="#090A10" stroke="#FF0055"
    stroke-width="4" stroke-linejoin="round" />

  <!-- Inner Tactical Hexagon -->
  <polygon points="128,14 236,73 236,183 128,242 20,183 20,73" fill="url(#grid)" stroke="#00E5FF"
    stroke-width="2" opacity="0.4" stroke-linejoin="round" />

  <!-- Tactical Reticle Details -->
  <circle cx="128" cy="128" r="85" stroke="#1A1D2D" stroke-width="2" fill="none" />
  <circle cx="128" cy="128" r="60" stroke="#00E5FF" stroke-width="1.5" fill="none"
    stroke-dasharray="8 4" opacity="0.3" />
  <path d="M 128 20 V 236 M 20 128 H 236" stroke="#1A1D2D" stroke-width="2" opacity="0.5" />

  <!-- Laser Beam -->
  <line x1="189" y1="125" x2="256" y2="125" stroke="#00E5FF" stroke-width="2"
    stroke-dasharray="10 6" opacity="0.7" />

  <!-- 
    =========================================
    RIFLE GROUP
    Centered via translate, built with layers
    =========================================
  -->
  <g transform="translate(4, -10)">

    <!-- LAYER 1: Under-mounts & Parts tucking BEHIND the main body -->
    <!-- Curved Translucent Magazine -->
    <path d="M 125 140 H 138 Q 142 175 155 195 H 140 Q 128 175 125 140 Z" fill="#FF0055" />
    <path d="M 124 155 H 142 M 126 170 H 146 M 132 185 H 152" stroke="#090A10" stroke-width="3"
      stroke-linecap="round" />

    <!-- Pistol Grip -->
    <path d="M 85 140 H 100 L 92 185 Q 85 190 80 185 L 75 165 Q 80 155 85 140 Z" fill="#FFFFFF" />
    <polygon points="90,152 96,152 90,175 84,175" fill="#00E5FF" />

    <!-- Barrel -->
    <rect x="180" y="122" width="45" height="6" fill="#FFFFFF" />

    <!-- Trigger Guard & Trigger -->
    <path d="M 96 140 V 156 Q 96 158 98 158 H 116 Q 118 158 118 156 V 140" fill="none"
      stroke="#00E5FF" stroke-width="4" />
    <path d="M 108 140 V 152" stroke="#FF0055" stroke-width="3" stroke-linecap="round" />

    <!-- LAYER 2: Skeleton Stock & Handguard (Tucks into receiver) -->
    <!-- Skeleton Stock (Using evenodd for true transparent cutout) -->
    <path fill-rule="evenodd"
      d="M 65 118 H 25 Q 15 118 15 128 V 140 L 25 145 H 65 Z M 52 125 H 32 Q 25 125 25 130 V 135 L 32 138 H 52 Z"
      fill="#FFFFFF" />
    <!-- Stock Details: Cheek Rest & Shoulder Pad -->
    <rect x="35" y="112" width="20" height="6" rx="2" fill="#FF0055" />
    <path d="M 15 125 V 142 A 2 2 0 0 1 11 142 V 125 A 2 2 0 0 1 15 125 Z" fill="#00E5FF" />

    <!-- Handguard with true transparent slant vents -->
    <path fill-rule="evenodd"
      d="M 135 118 H 195 L 200 132 H 135 Z M 150 122 H 155 L 158 128 H 153 Z M 165 122 H 170 L 173 128 H 168 Z M 180 122 H 185 L 188 128 H 183 Z"
      fill="#FFFFFF" />
    <!-- Tactical Laser Module & Pins -->
    <polygon points="160,132 185,132 185,138 165,138" fill="#00E5FF" />
    <circle cx="145" cy="125" r="2" fill="#090A10" />
    <circle cx="192" cy="125" r="2" fill="#090A10" />

    <!-- Open-Prong Flash Hider -->
    <polygon points="223,120 236,120 236,122 226,124 236,126 236,128 223,128" fill="#FF0055"
      stroke-linejoin="round" />

    <!-- LAYER 3: Main Receiver (Covers structural joints) -->
    <path d="M 60 118 H 140 V 145 H 125 L 120 158 H 94 L 90 145 H 60 Z" fill="#FFFFFF" />

    <!-- Receiver Details & Kill Marks -->
    <g fill="#FF0055">
      <polygon points="70,132 75,124 78,124 73,132" />
      <polygon points="78,132 83,124 86,124 81,132" />
      <polygon points="86,132 91,124 94,124 89,132" />
    </g>
    <!-- Ambi Fire Selector -->
    <circle cx="80" cy="128" r="4" fill="#00E5FF" />
    <path d="M 80 128 L 86 130" stroke="#00E5FF" stroke-width="2" stroke-linecap="round" />

    <!-- Mag Release Paddle -->
    <polygon points="120,145 125,145 123,155 118,155" fill="#00E5FF" />

    <!-- Ejection Port & Bolt Carrier -->
    <rect x="110" y="122" width="22" height="8" rx="2" fill="#090A10" />
    <rect x="112" y="124" width="8" height="4" rx="1" fill="#FFFFFF" />

    <!-- LAYER 4: Iconic High-Bridge Carry Handle / Optic -->
    <!-- Extends slightly into receiver/handguard to completely erase hairlines -->
    <path d="M 60 120 L 60 90 L 65 85 L 140 85 L 165 120 L 150 120 L 130 98 L 75 98 L 75 120 Z"
      fill="#00E5FF" />

    <!-- Optic Sights & Top Rail -->
    <circle cx="68" cy="92" r="4" fill="#FF0055" />
    <path d="M 152 85 V 80 H 155 V 85 Z" fill="#FFFFFF" />
    <line x1="75" y1="83" x2="135" y2="83" stroke="#FFFFFF" stroke-width="2" />

    <!-- Ambi Charging Handle (Folded flat under carry handle) -->
    <rect x="80" y="112" width="12" height="6" rx="2" fill="#FF0055" />

  </g>
</svg>